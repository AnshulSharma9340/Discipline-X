services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disciplinex_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disciplinex_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: disciplinex_nginx
    profiles: ["prod"]
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
