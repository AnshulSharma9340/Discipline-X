<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DisciplineX">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="fGlow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feFlood flood-color="#d946ef" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#fGlow)">
    <g transform="rotate(45 32 32)">
      <rect x="13" y="13" width="38" height="38" rx="9" ry="9" fill="url(#fbg)"
            stroke="#e879f9" stroke-width="1.5"/>
    </g>
  </g>
  <!-- X — font 36, baseline at 32 + 13 = 45 -->
  <text x="32" y="45"
        font-family="Inter, system-ui, sans-serif"
        font-weight="900" font-size="36"
        fill="#ffffff"
        text-anchor="middle">X</text>
</svg>
