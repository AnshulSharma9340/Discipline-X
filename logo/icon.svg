<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DisciplineX">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');</style>

    <!-- Diamond fill: deep purple -> near black, matches reel -->
    <linearGradient id="hexBg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#2a0a55"/>
      <stop offset="100%" stop-color="#0d0220"/>
    </linearGradient>

    <!-- Top-left radial highlight inside the diamond -->
    <radialGradient id="hexShine" cx="30%" cy="20%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- X gradient: white -> lavender -> electric violet -->
    <linearGradient id="xGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Wide soft outer aura (violet) -->
    <filter id="auraWide" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="48" result="b"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.65"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Tight magenta neon glow that hugs the border -->
    <filter id="auraTight" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feFlood flood-color="#d946ef" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Border-only glow: makes the magenta stroke emit light -->
    <filter id="borderGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feFlood flood-color="#e879f9" flood-opacity="0.95"/>
      <feComposite in2="b" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Magenta glow halo around the X glyph -->
    <filter id="xGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feFlood flood-color="#d946ef" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LAYER 1 — wide violet aura behind everything -->
  <g filter="url(#auraWide)">
    <g transform="rotate(45 512 512)">
      <rect x="172" y="172" width="680" height="680" rx="168" ry="168" fill="#a855f7"/>
    </g>
  </g>

  <!-- LAYER 2 — tight magenta halo just outside border -->
  <g filter="url(#auraTight)">
    <g transform="rotate(45 512 512)">
      <rect x="172" y="172" width="680" height="680" rx="168" ry="168"
            fill="none" stroke="#d946ef" stroke-width="6"/>
    </g>
  </g>

  <!-- LAYER 3 — main diamond with fill + shine -->
  <g transform="rotate(45 512 512)">
    <!-- base fill -->
    <rect x="172" y="172" width="680" height="680" rx="168" ry="168" fill="url(#hexBg)"/>
    <!-- top-left shine -->
    <rect x="172" y="172" width="680" height="680" rx="168" ry="168" fill="url(#hexShine)"/>
    <!-- subtle inner rim highlight -->
    <rect x="186" y="186" width="652" height="652" rx="158" ry="158"
          fill="none" stroke="#c084fc" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- LAYER 4 — glowing magenta border ON TOP -->
  <g filter="url(#borderGlow)">
    <g transform="rotate(45 512 512)">
      <rect x="172" y="172" width="680" height="680" rx="168" ry="168"
            fill="none" stroke="#e879f9" stroke-opacity="0.95" stroke-width="10"/>
    </g>
  </g>

  <!-- LAYER 5 — the X (upright, perfectly centered, glowing) -->
  <!-- Center math: Inter Black cap-height ≈ 0.73em.
       Place baseline at y = 512 + (font-size * 0.73) / 2 = 512 + 168 = 680 -->
  <g filter="url(#xGlow)">
    <text x="512" y="680"
          font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-weight="900"
          font-size="460"
          fill="url(#xGrad)"
          text-anchor="middle">X</text>
  </g>
</svg>
