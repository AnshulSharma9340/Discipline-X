<svg viewBox="0 0 1800 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DisciplineX">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&amp;display=swap');</style>

    <linearGradient id="lhBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2a0a55"/>
      <stop offset="100%" stop-color="#0d0220"/>
    </linearGradient>
    <radialGradient id="lhShine" cx="30%" cy="20%" r="65%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lhX" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="lhWm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f5e9ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="lhAcc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="lhAuraWide" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.65"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lhAuraTight" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feFlood flood-color="#d946ef" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lhBorderGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feFlood flood-color="#e879f9" flood-opacity="0.95"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lhXGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#d946ef" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lhWmGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Diamond icon (left, 400x400 box translated) -->
  <g transform="translate(40,40)">
    <!-- wide aura -->
    <g filter="url(#lhAuraWide)">
      <g transform="rotate(45 200 200)">
        <rect x="60" y="60" width="280" height="280" rx="69" fill="#a855f7"/>
      </g>
    </g>
    <!-- tight halo -->
    <g filter="url(#lhAuraTight)">
      <g transform="rotate(45 200 200)">
        <rect x="60" y="60" width="280" height="280" rx="69" fill="none" stroke="#d946ef" stroke-width="3"/>
      </g>
    </g>
    <!-- main diamond -->
    <g transform="rotate(45 200 200)">
      <rect x="60" y="60" width="280" height="280" rx="69" fill="url(#lhBg)"/>
      <rect x="60" y="60" width="280" height="280" rx="69" fill="url(#lhShine)"/>
      <rect x="66" y="66" width="268" height="268" rx="65"
            fill="none" stroke="#c084fc" stroke-opacity="0.35" stroke-width="1"/>
    </g>
    <!-- glowing border -->
    <g filter="url(#lhBorderGlow)">
      <g transform="rotate(45 200 200)">
        <rect x="60" y="60" width="280" height="280" rx="69"
              fill="none" stroke="#e879f9" stroke-opacity="0.95" stroke-width="4"/>
      </g>
    </g>
    <!-- X — font 189, baseline at 200 + 69 = 269 -->
    <g filter="url(#lhXGlow)">
      <text x="200" y="269"
            font-family="Inter, system-ui, sans-serif"
            font-weight="900" font-size="189"
            fill="url(#lhX)"
            text-anchor="middle">X</text>
    </g>
  </g>

  <!-- Wordmark -->
  <g filter="url(#lhWmGlow)">
    <text x="500" y="270"
          font-family="Inter, system-ui, sans-serif"
          font-weight="800" font-size="200" letter-spacing="-7">
      <tspan fill="url(#lhWm)">Discipline</tspan><tspan fill="url(#lhAcc)">X</tspan>
    </text>
  </g>
</svg>
