<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DisciplineX">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&amp;family=JetBrains+Mono:wght@600&amp;display=swap');</style>

    <linearGradient id="sBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2a0a55"/>
      <stop offset="100%" stop-color="#0d0220"/>
    </linearGradient>
    <radialGradient id="sShine" cx="30%" cy="20%" r="65%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sX" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="sWm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f5e9ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="sAcc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="sAuraWide" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="32" result="b"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.65"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sAuraTight" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feFlood flood-color="#d946ef" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sBorderGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feFlood flood-color="#e879f9" flood-opacity="0.95"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sXGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feFlood flood-color="#d946ef" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sWmGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Diamond icon, 480px box centered -->
  <g transform="translate(160,80)">
    <g filter="url(#sAuraWide)">
      <g transform="rotate(45 240 240)">
        <rect x="72" y="72" width="336" height="336" rx="83" fill="#a855f7"/>
      </g>
    </g>
    <g filter="url(#sAuraTight)">
      <g transform="rotate(45 240 240)">
        <rect x="72" y="72" width="336" height="336" rx="83" fill="none" stroke="#d946ef" stroke-width="4"/>
      </g>
    </g>
    <g transform="rotate(45 240 240)">
      <rect x="72" y="72" width="336" height="336" rx="83" fill="url(#sBg)"/>
      <rect x="72" y="72" width="336" height="336" rx="83" fill="url(#sShine)"/>
      <rect x="79" y="79" width="322" height="322" rx="78"
            fill="none" stroke="#c084fc" stroke-opacity="0.35" stroke-width="1"/>
    </g>
    <g filter="url(#sBorderGlow)">
      <g transform="rotate(45 240 240)">
        <rect x="72" y="72" width="336" height="336" rx="83"
              fill="none" stroke="#e879f9" stroke-opacity="0.95" stroke-width="5"/>
      </g>
    </g>
    <!-- X — font 227, baseline at 240 + 83 = 323 -->
    <g filter="url(#sXGlow)">
      <text x="240" y="323"
            font-family="Inter, system-ui, sans-serif"
            font-weight="900" font-size="227"
            fill="url(#sX)"
            text-anchor="middle">X</text>
    </g>
  </g>

  <!-- Wordmark -->
  <g filter="url(#sWmGlow)">
    <text x="400" y="780"
          font-family="Inter, system-ui, sans-serif"
          font-weight="800" font-size="160" letter-spacing="-6"
          text-anchor="middle">
      <tspan fill="url(#sWm)">Discipline</tspan><tspan fill="url(#sAcc)">X</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="400" y="860" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, Consolas, monospace"
        font-weight="600" font-size="36" letter-spacing="6"
        fill="#c7bfe6" opacity="0.85">STAY SHARP. SHIP DAILY.</text>
</svg>
