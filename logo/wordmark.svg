<svg viewBox="0 0 1400 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DisciplineX">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f5e9ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="wmAcc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="wmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#wmGlow)" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
     font-weight="800" font-size="220" letter-spacing="-8" text-anchor="middle">
    <text x="700" y="200" fill="url(#wm)">Discipline<tspan fill="url(#wmAcc)">X</tspan></text>
  </g>
</svg>
